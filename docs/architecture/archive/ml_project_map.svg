<svg xmlns="http://www.w3.org/2000/svg" width="800" height="660" viewBox="0 0 800 660" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="660" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">DATSCI7030 — ML Project Architecture Map</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#666666">Causal Event-Driven Market Impact Modelling · LJMU 2025–2026</text>
  <line x1="40" y1="58" x2="760" y2="58" stroke="#AAAAAA" stroke-width="0.7"/>

  <!-- Phase 1: Data inputs -->
  <text x="60" y="76" font-size="10" font-weight="700" fill="#333333">Phase 1 — Data Acquisition</text>
  <line x1="60" y1="80" x2="740" y2="80" stroke="#DDDDDD" stroke-width="0.6"/>

  <rect x="40" y="86" width="166" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="123" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">News headlines &amp; events</text>
  <text x="123" y="126" text-anchor="middle" font-size="9" fill="#444444">NewsAPI · GDELT · FOMC · macro</text>

  <rect x="218" y="86" width="166" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="301" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">News events</text>
  <text x="301" y="126" text-anchor="middle" font-size="9" fill="#444444">NewsAPI, GDELT, yfinance</text>

  <rect x="396" y="86" width="166" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="479" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Market prices</text>
  <text x="479" y="126" text-anchor="middle" font-size="9" fill="#444444">S&amp;P 500, Gold (XAU/USD)</text>

  <rect x="574" y="86" width="186" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="667" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Macro indicators</text>
  <text x="667" y="126" text-anchor="middle" font-size="9" fill="#444444">VIX, CPI, FRED interest rates</text>

  <line x1="400" y1="140" x2="400" y2="162" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: Feature Engineering -->
  <text x="60" y="176" font-size="10" font-weight="700" fill="#333333">Phase 2 — Feature Engineering</text>
  <line x1="60" y1="180" x2="740" y2="180" stroke="#DDDDDD" stroke-width="0.6"/>

  <rect x="40" y="186" width="220" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="150" y="208" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">NLP sentiment</text>
  <text x="150" y="226" text-anchor="middle" font-size="9" fill="#444444">FinBERT / domain-adapted transformer</text>

  <rect x="280" y="186" width="220" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="390" y="208" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Event encoding</text>
  <text x="390" y="226" text-anchor="middle" font-size="9" fill="#444444">Pulse / step binary flags, event type</text>

  <rect x="520" y="186" width="240" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="640" y="208" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Lag features</text>
  <text x="640" y="226" text-anchor="middle" font-size="9" fill="#444444">Rolling returns, volatility, VIX</text>

  <line x1="400" y1="240" x2="400" y2="262" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: Baseline Modelling -->
  <text x="60" y="276" font-size="10" font-weight="700" fill="#333333">Phase 3 — ARIMA Baseline Modelling</text>
  <line x1="60" y1="280" x2="740" y2="280" stroke="#DDDDDD" stroke-width="0.6"/>

  <rect x="40" y="286" width="340" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="210" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">ARIMA intervention (statsmodels SARIMAX)</text>
  <text x="210" y="326" text-anchor="middle" font-size="9" fill="#444444">Order selection via AIC; pulse and step variables</text>

  <rect x="400" y="286" width="360" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="580" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Abnormal return computation</text>
  <text x="580" y="326" text-anchor="middle" font-size="9" fill="#444444">CARₑₐ(t₁, t₂) = Σ (Rₜₐ − E[Rₜₐ])</text>

  <line x1="400" y1="340" x2="400" y2="362" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: Explanatory Layer -->
  <text x="60" y="376" font-size="10" font-weight="700" fill="#333333">Phase 4 — Explanatory Layer: NLP and Regression</text>
  <line x1="60" y1="380" x2="740" y2="380" stroke="#DDDDDD" stroke-width="0.6"/>

  <rect x="40" y="386" width="220" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="150" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">XGBoost · LightGBM · LASSO</text>
  <text x="150" y="426" text-anchor="middle" font-size="9" fill="#444444">Predict return magnitude · TimeSeriesSplit CV</text>

  <rect x="280" y="386" width="220" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="390" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Directional accuracy</text>
  <text x="390" y="426" text-anchor="middle" font-size="9" fill="#444444">Sign(ŷ) vs Sign(y) — per asset</text>

  <rect x="520" y="386" width="240" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="640" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">SHAP interpretability</text>
  <text x="640" y="426" text-anchor="middle" font-size="9" fill="#444444">Feature attribution per event and asset</text>

  <line x1="400" y1="440" x2="400" y2="462" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 5: Validation -->
  <text x="60" y="476" font-size="10" font-weight="700" fill="#333333">Phase 5 — Validation and Reporting</text>
  <line x1="60" y1="480" x2="740" y2="480" stroke="#DDDDDD" stroke-width="0.6"/>

  <rect x="40" y="486" width="220" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="150" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Out-of-sample backtest</text>
  <text x="150" y="526" text-anchor="middle" font-size="9" fill="#444444">Test set: 2023–2024 events</text>

  <rect x="280" y="486" width="220" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="390" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Naive benchmark comparison</text>
  <text x="390" y="526" text-anchor="middle" font-size="9" fill="#444444">MAE, RMSE, directional accuracy</text>

  <rect x="520" y="486" width="240" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="640" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Report and dashboard</text>
  <text x="640" y="526" text-anchor="middle" font-size="9" fill="#444444">Plotly / Streamlit; SHAP attribution charts</text>

  <line x1="60" y1="556" x2="740" y2="556" stroke="#CCCCCC" stroke-width="0.6"/>
  <text x="400" y="568" text-anchor="middle" font-size="9" fill="#AAAAAA">DATSCI7030 — ML Project Architecture Map — Version 1.1</text>
</svg>
