  <text x="340" y="156" text-anchor="middle" dominant-baseline="central" font-family="Anthropic Sans, sans-serif" font-size="14" font-weight="500" fill="#111" style="fill:rgb(17, 17, 17);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">Data Collectors</text>
