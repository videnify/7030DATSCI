<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="580" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">Intervention Equation — Component Breakdown</text>
  <line x1="40" y1="38" x2="760" y2="38" stroke="#AAAAAA" stroke-width="0.7"/>

  <!-- Equation box -->
  <rect x="60" y="48" width="680" height="52" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1.2"/>
  <text x="400" y="78" text-anchor="middle" font-size="17" font-weight="700" fill="#111111">Yₜ  =  ωIₜ / (1 − δB)  +  ARIMA(p,d,q) noise</text>

  <!-- Annotation lines -->
  <line x1="128" y1="102" x2="128" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="128" y1="118" x2="175" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="175" y1="118" x2="175" y2="132" stroke="#AAAAAA" stroke-width="0.8" marker-end="url(#arrow)"/>

  <line x1="320" y1="102" x2="320" y2="122" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="320" y1="122" x2="380" y2="122" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="380" y1="122" x2="380" y2="132" stroke="#AAAAAA" stroke-width="0.8" marker-end="url(#arrow)"/>

  <line x1="580" y1="102" x2="580" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="580" y1="118" x2="618" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="618" y1="118" x2="618" y2="132" stroke="#AAAAAA" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- Top three cards -->
  <rect x="60" y="134" width="220" height="72" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="170" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Yₜ — observed return</text>
  <text x="170" y="178" text-anchor="middle" font-size="10" fill="#444444">Actual log return at time t</text>
  <text x="170" y="196" text-anchor="middle" font-size="10" fill="#444444">Measured from market data</text>

  <rect x="290" y="134" width="220" height="72" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">ωIₜ / (1 − δB)</text>
  <text x="400" y="178" text-anchor="middle" font-size="10" fill="#444444">The event shock term</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" fill="#444444">Intervention-induced displacement</text>

  <rect x="520" y="134" width="220" height="72" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="630" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">ARIMA(p,d,q)</text>
  <text x="630" y="178" text-anchor="middle" font-size="10" fill="#444444">Baseline market behaviour</text>
  <text x="630" y="196" text-anchor="middle" font-size="10" fill="#444444">Fitted on pre-event window</text>

  <!-- Divider -->
  <line x1="60" y1="224" x2="740" y2="224" stroke="#DDDDDD" stroke-width="0.8"/>
  <text x="400" y="242" text-anchor="middle" font-size="10" fill="#888888" font-style="italic">Sub-components of the intervention term</text>

  <!-- Sub cards: ω, Iₜ, δ -->
  <rect x="60" y="252" width="196" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="158" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">ω (omega)</text>
  <text x="158" y="296" text-anchor="middle" font-size="10" fill="#444444">Immediate impact magnitude</text>
  <text x="158" y="314" text-anchor="middle" font-size="10" fill="#444444">Estimated by the model</text>

  <rect x="302" y="252" width="196" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Iₜ (indicator)</text>
  <text x="400" y="296" text-anchor="middle" font-size="10" fill="#444444">= 1 on event day t = 0</text>
  <text x="400" y="314" text-anchor="middle" font-size="10" fill="#444444">= 0 on all other days</text>

  <rect x="544" y="252" width="196" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="642" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">δ (delta)</text>
  <text x="642" y="296" text-anchor="middle" font-size="10" fill="#444444">Controls the decay rate</text>
  <text x="642" y="314" text-anchor="middle" font-size="10" fill="#444444">0 = instant · 1 = permanent</text>

  <!-- Divider -->
  <line x1="60" y1="350" x2="740" y2="350" stroke="#DDDDDD" stroke-width="0.8"/>
  <text x="400" y="368" text-anchor="middle" font-size="10" fill="#888888" font-style="italic">Two intervention shapes — determined by Iₜ and δ</text>

  <!-- Pulse vs Step -->
  <rect x="60" y="378" width="310" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="215" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Pulse — temporary shock</text>
  <text x="215" y="422" text-anchor="middle" font-size="10" fill="#444444">Iₜ = 1 at t = 0 only, then 0</text>
  <text x="215" y="440" text-anchor="middle" font-size="10" fill="#444444">Effect decays over time via δ</text>

  <rect x="430" y="378" width="310" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="585" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Step — permanent shift</text>
  <text x="585" y="422" text-anchor="middle" font-size="10" fill="#444444">Iₜ = 1 at t = 0, remains 1 thereafter</text>
  <text x="585" y="440" text-anchor="middle" font-size="10" fill="#444444">δ = 1, no decay occurs</text>

  <!-- Divider -->
  <line x1="60" y1="476" x2="740" y2="476" stroke="#DDDDDD" stroke-width="0.8"/>

  <!-- B operator -->
  <rect x="60" y="488" width="680" height="52" rx="5" fill="#FFFFFF" stroke="#AAAAAA" stroke-width="0.8"/>
  <text x="400" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#111111">B — the backshift operator</text>
  <text x="400" y="530" text-anchor="middle" font-size="10" fill="#444444">BYₜ = Yₜ₋₁ — shifts the series one period back; (1 − δB) in the denominator produces the geometric decay structure</text>

  <!-- Footer -->
  <line x1="60" y1="554" x2="740" y2="554" stroke="#CCCCCC" stroke-width="0.6"/>
  <text x="400" y="565" text-anchor="middle" font-size="9" fill="#AAAAAA">DATSCI7030 — Intervention Equation Reference — Version 1.1</text>
</svg>
