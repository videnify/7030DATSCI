<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="480" fill="#FFFFFF"/>
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">Hybrid Event-Driven and Sentiment Model</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#666666">Dual-Layer Architecture — Phases 3 and 4</text>
  <line x1="40" y1="58" x2="760" y2="58" stroke="#AAAAAA" stroke-width="0.7"/>

  <!-- Layer labels -->
  <text x="190" y="76" text-anchor="middle" font-size="10" font-style="italic" fill="#888888">Layer 1 — what happened (Phase 3)</text>
  <text x="610" y="76" text-anchor="middle" font-size="10" font-style="italic" fill="#888888">Layer 2 — why it happened (Phase 4)</text>

  <!-- ARIMA box -->
  <rect x="40" y="84" width="300" height="68" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="190" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">ARIMA intervention</text>
  <text x="190" y="126" text-anchor="middle" font-size="10" fill="#444444">Measures abnormal return per event</text>
  <text x="190" y="142" text-anchor="middle" font-size="9" fill="#666666">statsmodels SARIMAX — order via AIC</text>

  <!-- NLP box -->
  <rect x="460" y="84" width="300" height="68" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="610" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">NLP sentiment score</text>
  <text x="610" y="126" text-anchor="middle" font-size="10" fill="#444444">Scores speech / statement tone</text>
  <text x="610" y="142" text-anchor="middle" font-size="9" fill="#666666">FinBERT — P(pos), P(neg), P(neu) → composite score</text>

  <line x1="190" y1="154" x2="190" y2="200" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="154" x2="610" y2="200" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Combined feature vector -->
  <rect x="40" y="202" width="720" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Combined feature vector (per event)</text>
  <line x1="280" y1="236" x2="280" y2="276" stroke="#DDDDDD" stroke-width="0.8"/>
  <line x1="520" y1="236" x2="520" y2="276" stroke="#DDDDDD" stroke-width="0.8"/>
  <text x="160" y="256" text-anchor="middle" font-size="10" fill="#444444">Abnormal return (CARₑₐ)</text>
  <text x="400" y="256" text-anchor="middle" font-size="10" fill="#444444">Sentiment score</text>
  <text x="640" y="256" text-anchor="middle" font-size="10" fill="#444444">Event type + asset</text>
  <text x="160" y="272" text-anchor="middle" font-size="9" fill="#888888">from ARIMA</text>
  <text x="400" y="272" text-anchor="middle" font-size="9" fill="#888888">from FinBERT</text>
  <text x="640" y="272" text-anchor="middle" font-size="9" fill="#888888">categorical features</text>

  <line x1="400" y1="284" x2="400" y2="318" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Regression and Classifier -->
  <rect x="80" y="320" width="270" height="64" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="215" y="344" text-anchor="middle" font-size="12" font-weight="700" fill="#111111">XGBoost · LightGBM · LASSO</text>
  <text x="215" y="362" text-anchor="middle" font-size="10" fill="#444444">Predict return magnitude · TimeSeriesSplit CV</text>
  <text x="215" y="376" text-anchor="middle" font-size="9" fill="#666666">+ SHAP attribution</text>

  <rect x="450" y="320" width="270" height="64" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="585" y="344" text-anchor="middle" font-size="12" font-weight="700" fill="#111111">Directional accuracy metric</text>
  <text x="585" y="362" text-anchor="middle" font-size="10" fill="#444444">Sign(prediction) vs Sign(actual)</text>
  <text x="585" y="376" text-anchor="middle" font-size="9" fill="#666666">per asset · per event type</text>

  <line x1="215" y1="386" x2="215" y2="420" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="585" y1="386" x2="585" y2="420" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="422" width="270" height="36" rx="5" fill="#FFFFFF" stroke="#AAAAAA" stroke-width="0.8"/>
  <text x="215" y="445" text-anchor="middle" font-size="10" fill="#444444">How much did sentiment drive it?</text>

  <rect x="450" y="422" width="270" height="36" rx="5" fill="#FFFFFF" stroke="#AAAAAA" stroke-width="0.8"/>
  <text x="585" y="445" text-anchor="middle" font-size="10" fill="#444444">Which asset reacted more, and why?</text>

  <line x1="40" y1="470" x2="760" y2="470" stroke="#CCCCCC" stroke-width="0.6"/>
  <text x="400" y="478" text-anchor="middle" font-size="9" fill="#AAAAAA">DATSCI7030 — Hybrid Model Architecture — Version 1.1</text>
</svg>
