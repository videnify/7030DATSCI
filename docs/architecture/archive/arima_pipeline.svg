<svg xmlns="http://www.w3.org/2000/svg" width="800" height="760" viewBox="0 0 800 760" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="760" fill="#FFFFFF"/>
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">ARIMA-Based Intervention Analysis Pipeline</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" fill="#666666">Event-Driven Market Impact Assessment — Causal Inference Pipeline</text>
  <line x1="60" y1="60" x2="740" y2="60" stroke="#AAAAAA" stroke-width="0.8"/>

  <rect x="60" y="76" width="680" height="64" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="101" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Stage 1 — Event Catalogue Construction</text>
  <text x="400" y="121" text-anchor="middle" font-size="11" fill="#444444">Identify and label discrete political events with date, type, and anticipated market direction</text>
  <line x1="400" y1="142" x2="400" y2="168" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="170" width="680" height="64" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Stage 2 — Event Window Definition</text>
  <text x="400" y="215" text-anchor="middle" font-size="11" fill="#444444">Pre-event baseline (e.g. −60 trading days), event date t = 0, post-event horizon (e.g. +30 days)</text>
  <line x1="400" y1="236" x2="400" y2="262" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="264" width="680" height="80" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Stage 3 — ARIMA Baseline Estimation</text>
  <text x="400" y="308" text-anchor="middle" font-size="11" fill="#444444">Fit ARIMA(p,d,q) on the pre-event window; order selection via Akaike Information Criterion (AIC)</text>
  <text x="400" y="328" text-anchor="middle" font-size="11" fill="#444444">Implementation: statsmodels SARIMAX framework in Python</text>
  <line x1="400" y1="346" x2="400" y2="372" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="400" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#333333">Stage 4 — Intervention Variable Specification</text>

  <rect x="60" y="400" width="320" height="80" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="220" y="424" text-anchor="middle" font-size="12" font-weight="700" fill="#111111">4a — Pulse Intervention</text>
  <text x="220" y="444" text-anchor="middle" font-size="10" fill="#444444">Spike at t = 0, decays to baseline via δ</text>
  <text x="220" y="462" text-anchor="middle" font-size="10" fill="#444444">Suitable for: election outcomes, rate decisions</text>

  <rect x="420" y="400" width="320" height="80" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="580" y="424" text-anchor="middle" font-size="12" font-weight="700" fill="#111111">4b — Step Intervention</text>
  <text x="580" y="444" text-anchor="middle" font-size="10" fill="#444444">Permanent level shift from t = 0 onward</text>
  <text x="580" y="462" text-anchor="middle" font-size="10" fill="#444444">Suitable for: enacted trade policy, sanctions</text>

  <line x1="220" y1="482" x2="220" y2="520" stroke="#888888" stroke-width="1.2"/>
  <line x1="580" y1="482" x2="580" y2="520" stroke="#888888" stroke-width="1.2"/>
  <line x1="220" y1="520" x2="580" y2="520" stroke="#888888" stroke-width="1.2"/>
  <line x1="400" y1="520" x2="400" y2="544" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="546" width="680" height="64" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="571" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Stage 5 — Abnormal Return Measurement</text>
  <text x="400" y="591" text-anchor="middle" font-size="11" fill="#444444">Abnormal Return = Actual Log Return − ARIMA Expected Return; quantifies event-induced market displacement</text>
  <line x1="400" y1="612" x2="400" y2="638" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="640" width="680" height="64" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="665" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Stage 6 — Cross-Event Aggregation and Significance Testing</text>
  <text x="400" y="685" text-anchor="middle" font-size="11" fill="#444444">Average abnormal returns across event set; apply t-test or Wilcoxon signed-rank test</text>

  <line x1="60" y1="720" x2="740" y2="720" stroke="#CCCCCC" stroke-width="0.6"/>
  <text x="400" y="734" text-anchor="middle" font-size="9" fill="#AAAAAA">DATSCI7030 — ARIMA Intervention Analysis Pipeline — Version 1.1</text>
</svg>
