<svg viewBox="0 0 1300 760" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Helvetica, Arial, sans-serif">
  <title>Professional Causal DAG for GOVFIN DoWhy Model</title>
  <desc>Minimal academic causal DAG for political communication, sentiment, confounders and market returns.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 13px; fill: #6B7280; }
      .section { font-size: 12px; font-weight: 700; letter-spacing: .7px; fill: #374151; text-transform: uppercase; }
      .node-title { font-size: 16px; font-weight: 700; fill: #111827; }
      .node-small { font-size: 12px; fill: #4B5563; }
      .node-code { font-size: 11px; font-weight: 700; fill: #6B7280; }
      .caption { font-size: 11px; fill: #6B7280; }
      .box { stroke: #D1D5DB; stroke-width: 1.4; rx: 12; }
      .conf { fill: #F3F4F6; }
      .treat { fill: #E8EEF7; }
      .med { fill: #F5EFE7; }
      .out { fill: #EAF3EC; }
      .line { stroke: #6B7280; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
      .line-dark { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrowDark); }
      .line-dash { stroke: #9CA3AF; stroke-width: 1.7; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .panel { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1.2; rx: 14; }
    </style>
  </defs>

  <rect width="1300" height="760" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="650" y="52" text-anchor="middle" class="title">Causal Framework for Event-Driven Market Impact Modelling</text>
  <text x="650" y="78" text-anchor="middle" class="subtitle">Conceptual DAG for DoWhy-based estimation of political communication effects on asset returns</text>

  <!-- Main panel -->
  <rect x="64" y="112" width="1172" height="490" class="panel"/>

  <!-- Layer labels -->
  <text x="180" y="150" text-anchor="middle" class="section">Treatment</text>
  <text x="505" y="150" text-anchor="middle" class="section">Text-derived mediator</text>
  <text x="830" y="150" text-anchor="middle" class="section">Market outcome</text>
  <text x="650" y="525" text-anchor="middle" class="section">Observed confounders / controls</text>

  <!-- Confounders box background -->
  <rect x="210" y="465" width="880" height="88" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1" rx="12"/>

  <!-- Edges: confounders to treatment/outcome -->
  <path d="M 365 465 C 290 410, 240 350, 205 283" class="line-dash"/>
  <path d="M 560 465 C 555 405, 540 335, 520 283" class="line-dash"/>
  <path d="M 735 465 C 780 405, 815 345, 833 283" class="line-dash"/>
  <path d="M 940 465 C 905 405, 875 345, 850 283" class="line-dash"/>

  <!-- Treatment and causal paths -->
  <path d="M 295 245 L 392 245" class="line-dark"/>
  <path d="M 608 245 L 717 245" class="line-dark"/>
  <path d="M 290 286 C 435 390, 660 391, 765 290" class="line"/>

  <!-- Main nodes -->
  <rect x="90" y="184" width="205" height="122" class="box treat"/>
  <text x="192.5" y="212" text-anchor="middle" class="node-code">TREATMENT</text>
  <text x="192.5" y="242" text-anchor="middle" class="node-title">Political</text>
  <text x="192.5" y="264" text-anchor="middle" class="node-title">Communication</text>
  <text x="192.5" y="287" text-anchor="middle" class="node-small">event occurrence / type</text>

  <rect x="402" y="184" width="205" height="122" class="box med"/>
  <text x="504.5" y="212" text-anchor="middle" class="node-code">MEDIATOR</text>
  <text x="504.5" y="242" text-anchor="middle" class="node-title">FinBERT</text>
  <text x="504.5" y="264" text-anchor="middle" class="node-title">Sentiment Score</text>
  <text x="504.5" y="287" text-anchor="middle" class="node-small">tone, polarity, intensity</text>

  <rect x="718" y="184" width="230" height="122" class="box out"/>
  <text x="833" y="212" text-anchor="middle" class="node-code">OUTCOME</text>
  <text x="833" y="242" text-anchor="middle" class="node-title">Asset Returns</text>
  <text x="833" y="266" text-anchor="middle" class="node-small">SPY, QQQ, GLD, TLT</text>
  <text x="833" y="287" text-anchor="middle" class="node-small">daily log return / CAR</text>

  <!-- Optional event severity node -->
  <rect x="1005" y="184" width="170" height="122" class="box med"/>
  <text x="1090" y="212" text-anchor="middle" class="node-code">EVENT CONTEXT</text>
  <text x="1090" y="242" text-anchor="middle" class="node-title">Severity</text>
  <text x="1090" y="266" text-anchor="middle" class="node-small">Goldstein scale</text>
  <text x="1090" y="287" text-anchor="middle" class="node-small">shock intensity</text>
  <path d="M 1005 245 L 948 245" class="line"/>

  <!-- Confounder nodes -->
  <rect x="250" y="487" width="175" height="44" class="box conf"/>
  <text x="337.5" y="506" text-anchor="middle" class="node-title" style="font-size:14px">VIX / ΔVIX</text>
  <text x="337.5" y="523" text-anchor="middle" class="node-small">risk sentiment</text>

  <rect x="470" y="487" width="175" height="44" class="box conf"/>
  <text x="557.5" y="506" text-anchor="middle" class="node-title" style="font-size:14px">Macro Regime</text>
  <text x="557.5" y="523" text-anchor="middle" class="node-small">CPI, rates, yields</text>

  <rect x="690" y="487" width="175" height="44" class="box conf"/>
  <text x="777.5" y="506" text-anchor="middle" class="node-title" style="font-size:14px">FOMC Policy</text>
  <text x="777.5" y="523" text-anchor="middle" class="node-small">hikes, cuts, holds</text>

  <rect x="910" y="487" width="150" height="44" class="box conf"/>
  <text x="985" y="506" text-anchor="middle" class="node-title" style="font-size:14px">GDELT</text>
  <text x="985" y="523" text-anchor="middle" class="node-small">geopolitical shocks</text>

  <!-- Identification note -->
  <rect x="96" y="346" width="1088" height="72" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" rx="10"/>
  <text x="118" y="374" class="node-title" style="font-size:14px">Identification logic</text>
  <text x="118" y="397" class="caption">Estimate the effect of political communication on market returns after adjusting for observed backdoor paths through risk sentiment, macro regime, FOMC policy, and geopolitical shocks.</text>

  <!-- Legend / line key -->
  <rect x="64" y="632" width="1172" height="74" class="panel"/>
  <line x1="100" y1="658" x2="160" y2="658" class="line-dark"/>
  <text x="175" y="662" class="caption">Primary causal pathway</text>
  <line x1="345" y1="658" x2="405" y2="658" class="line-dash"/>
  <text x="420" y="662" class="caption">Confounding/control pathway</text>
  <rect x="640" y="645" width="18" height="18" class="box treat"/>
  <text x="670" y="660" class="caption">Treatment</text>
  <rect x="760" y="645" width="18" height="18" class="box med"/>
  <text x="790" y="660" class="caption">Mediator/context</text>
  <rect x="918" y="645" width="18" height="18" class="box out"/>
  <text x="948" y="660" class="caption">Outcome</text>
  <rect x="1040" y="645" width="18" height="18" class="box conf"/>
  <text x="1070" y="660" class="caption">Confounder</text>

  <text x="650" y="736" text-anchor="middle" class="caption">DATSCI7030 · GOVFIN Framework · Ibrahim Haroun · LJMU 2025–2026</text>
</svg>
