<svg width="1100" height="1500" viewBox="0 0 1100 1500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>GOVFIN Analytical Pipeline Architecture</title>
  <desc>End-to-end research workflow from data sources to validation, feature engineering, event detection, sentiment extraction, causal modelling, forecasting, and evaluation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 1 1 L 8.5 5 L 1 9" fill="none" stroke="#888888" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #222222; }
      .subtitle { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 400; fill: #555555; }
      .stage { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #222222; }
      .detail { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #555555; }
      .label { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #777777; letter-spacing: 1.3px; }
      .note { font-family: Inter, Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #666666; }
    </style>
  </defs>
  <rect x="0" y="0" width="1100" height="1500" fill="#FFFFFF"/>
  <text x="550.0" y="55" text-anchor="middle" class="title">GOVFIN Analytical Pipeline</text>
  <text x="550.0" y="83" text-anchor="middle" class="subtitle">From multi-source data ingestion to causal forecasting and evaluation</text>
  <line x1="210" y1="112" x2="890" y2="112" stroke="#D9D9D9" stroke-width="1"/>
  <!-- Layer 1: Data Sources -->
  <rect x="270.0" y="165" width="560" height="104" rx="8" fill="#EEF3F8" stroke="#D0D0D0" stroke-width="1"/>
  <text x="298.0" y="195" class="label">STAGE 1</text>
  <text x="550.0" y="222" text-anchor="middle" class="stage">Data Sources</text>
  <text x="550.0" y="247" text-anchor="middle" class="detail">SPY, QQQ, GLD, TLT, VIX · FRED · APP · GDELT</text>
  <line x1="550.0" y1="277" x2="550.0" y2="315" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Layer 2: Validation &amp; Cleaning -->
  <rect x="270.0" y="327" width="560" height="104" rx="8" fill="#F7F7F7" stroke="#D0D0D0" stroke-width="1"/>
  <text x="298.0" y="357" class="label">STAGE 2</text>
  <text x="550.0" y="384" text-anchor="middle" class="stage">Validation &amp; Cleaning</text>
  <text x="550.0" y="409" text-anchor="middle" class="detail">Missing-value audit · Trading-day alignment · Standardisation</text>
  <line x1="550.0" y1="439" x2="550.0" y2="477" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Layer 3: Feature Engineering -->
  <rect x="270.0" y="489" width="560" height="104" rx="8" fill="#F7F7F7" stroke="#D0D0D0" stroke-width="1"/>
  <text x="298.0" y="519" class="label">STAGE 3</text>
  <text x="550.0" y="546" text-anchor="middle" class="stage">Feature Engineering</text>
  <text x="550.0" y="571" text-anchor="middle" class="detail">Log returns · Rolling volatility · Event windows · Yield spread</text>
  <line x1="550.0" y1="601" x2="550.0" y2="639" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Layer 4: Event Detection -->
  <rect x="270.0" y="651" width="560" height="104" rx="8" fill="#F7F7F7" stroke="#D0D0D0" stroke-width="1"/>
  <text x="298.0" y="681" class="label">STAGE 4</text>
  <text x="550.0" y="708" text-anchor="middle" class="stage">Event Detection</text>
  <text x="550.0" y="733" text-anchor="middle" class="detail">FOMC classification · Shock detection · Communication intensity</text>
  <line x1="550.0" y1="763" x2="550.0" y2="801" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Layer 5: Sentiment Extraction -->
  <rect x="270.0" y="813" width="560" height="104" rx="8" fill="#F4EFE8" stroke="#D0D0D0" stroke-width="1"/>
  <text x="298.0" y="843" class="label">STAGE 5</text>
  <text x="550.0" y="870" text-anchor="middle" class="stage">Sentiment Extraction</text>
  <text x="550.0" y="895" text-anchor="middle" class="detail">FinBERT inference · Tone scoring · Daily sentiment index</text>
  <line x1="550.0" y1="925" x2="550.0" y2="963" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Layer 6: Causal Modelling -->
  <rect x="270.0" y="975" width="560" height="104" rx="8" fill="#EAF2EA" stroke="#D0D0D0" stroke-width="1"/>
  <text x="298.0" y="1005" class="label">STAGE 6</text>
  <text x="550.0" y="1032" text-anchor="middle" class="stage">Causal Modelling</text>
  <text x="550.0" y="1057" text-anchor="middle" class="detail">DoWhy DAG · Confounder adjustment · Event impact estimation</text>
  <line x1="550.0" y1="1087" x2="550.0" y2="1125" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Layer 7: Forecasting Models -->
  <rect x="270.0" y="1137" width="560" height="104" rx="8" fill="#EEF3F8" stroke="#D0D0D0" stroke-width="1"/>
  <text x="298.0" y="1167" class="label">STAGE 7</text>
  <text x="550.0" y="1194" text-anchor="middle" class="stage">Forecasting Models</text>
  <text x="550.0" y="1219" text-anchor="middle" class="detail">ARIMA · GARCH · LSTM · Hybrid causal-ML models</text>
  <line x1="550.0" y1="1249" x2="550.0" y2="1287" stroke="#888888" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Layer 8: Evaluation &amp; Dashboard -->
  <rect x="270.0" y="1299" width="560" height="104" rx="8" fill="#F7F7F7" stroke="#D0D0D0" stroke-width="1"/>
  <text x="298.0" y="1329" class="label">STAGE 8</text>
  <text x="550.0" y="1356" text-anchor="middle" class="stage">Evaluation &amp; Dashboard</text>
  <text x="550.0" y="1381" text-anchor="middle" class="detail">Backtesting · Sharpe attribution · Regime analysis · Visual reporting</text>
  <rect x="70" y="165" width="170" height="104" rx="8" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1"/>
  <text x="155" y="199" text-anchor="middle" class="label">INPUTS</text>
  <text x="155" y="227" text-anchor="middle" class="note">Financial, macro,</text>
  <text x="155" y="245" text-anchor="middle" class="note">political and event data</text>

  <rect x="860" y="1137" width="170" height="104" rx="8" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="1"/>
  <text x="945" y="1171" text-anchor="middle" class="label">OUTPUTS</text>
  <text x="945" y="1199" text-anchor="middle" class="note">Causal effects, forecasts,</text>
  <text x="945" y="1217" text-anchor="middle" class="note">regime insights</text>

  <text x="550.0" y="1455" text-anchor="middle" class="note">Designed for Section 1 of the DATSCI7030 GOVFIN report: Data Collection → Data Quality → EDA → Modelling</text>
</svg>
