<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="560" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">Cumulative Abnormal Return — Formula Breakdown</text>
  <line x1="40" y1="38" x2="760" y2="38" stroke="#AAAAAA" stroke-width="0.7"/>

  <!-- Equation box -->
  <rect x="60" y="48" width="680" height="52" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="1.2"/>
  <text x="400" y="78" text-anchor="middle" font-size="17" font-weight="700" fill="#111111">CARₑₐ(t₁, t₂)  =  Σ  ( Rₜₐ  −  E[Rₜₐ] )</text>

  <!-- Annotation lines -->
  <line x1="155" y1="102" x2="155" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="155" y1="118" x2="185" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="185" y1="118" x2="185" y2="132" stroke="#AAAAAA" stroke-width="0.8" marker-end="url(#arrow)"/>

  <line x1="360" y1="102" x2="360" y2="122" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="360" y1="122" x2="395" y2="122" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="395" y1="122" x2="395" y2="132" stroke="#AAAAAA" stroke-width="0.8" marker-end="url(#arrow)"/>

  <line x1="495" y1="102" x2="495" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="495" y1="118" x2="535" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="535" y1="118" x2="535" y2="132" stroke="#AAAAAA" stroke-width="0.8" marker-end="url(#arrow)"/>

  <line x1="625" y1="102" x2="625" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="625" y1="118" x2="655" y2="118" stroke="#AAAAAA" stroke-width="0.8"/>
  <line x1="655" y1="118" x2="655" y2="132" stroke="#AAAAAA" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- Top cards -->
  <rect x="60" y="134" width="230" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="175" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">CARₑₐ(t₁, t₂)</text>
  <text x="175" y="178" text-anchor="middle" font-size="10" fill="#444444">Cumulative Abnormal Return</text>
  <text x="175" y="196" text-anchor="middle" font-size="10" fill="#444444">for event e, asset a</text>

  <rect x="306" y="134" width="174" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="393" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Σ (summation)</text>
  <text x="393" y="178" text-anchor="middle" font-size="10" fill="#444444">Sum over every day</text>
  <text x="393" y="196" text-anchor="middle" font-size="10" fill="#444444">from t₁ to t₂</text>

  <rect x="496" y="134" width="116" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="554" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">Rₜₐ</text>
  <text x="554" y="178" text-anchor="middle" font-size="10" fill="#444444">Observed</text>
  <text x="554" y="196" text-anchor="middle" font-size="10" fill="#444444">log return</text>

  <rect x="628" y="134" width="112" height="80" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="684" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">E[Rₜₐ]</text>
  <text x="684" y="178" text-anchor="middle" font-size="10" fill="#444444">Market-model</text>
  <text x="684" y="196" text-anchor="middle" font-size="10" fill="#444444">expected return</text>

  <!-- Divider -->
  <line x1="60" y1="232" x2="740" y2="232" stroke="#DDDDDD" stroke-width="0.8"/>
  <text x="400" y="250" text-anchor="middle" font-size="10" fill="#888888" font-style="italic">Subscript reference — what the indices e and a denote</text>

  <rect x="60" y="260" width="310" height="64" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="215" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#111111">e — event index</text>
  <text x="215" y="306" text-anchor="middle" font-size="10" fill="#444444">Each political event in the catalogue</text>

  <rect x="430" y="260" width="310" height="64" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="585" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#111111">a — asset index</text>
  <text x="585" y="306" text-anchor="middle" font-size="10" fill="#444444">SPY (RQ1 evidence base — see 11_limitations.md)</text>

  <!-- Divider -->
  <line x1="60" y1="342" x2="740" y2="342" stroke="#DDDDDD" stroke-width="0.8"/>
  <text x="400" y="360" text-anchor="middle" font-size="10" fill="#888888" font-style="italic">The event window — what t₁ and t₂ define</text>

  <rect x="60" y="370" width="680" height="64" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="400" y="394" text-anchor="middle" font-size="12" font-weight="700" fill="#111111">t₁ to t₂ — event accumulation window</text>
  <text x="400" y="416" text-anchor="middle" font-size="10" fill="#444444">t₁ = −5, t₂ = +10 trading days (config.yaml: event_window_pre/post) — 120-day pre-window estimation</text>

  <!-- Divider -->
  <line x1="60" y1="452" x2="740" y2="452" stroke="#DDDDDD" stroke-width="0.8"/>
  <text x="400" y="470" text-anchor="middle" font-size="10" fill="#888888" font-style="italic">What each single-day term ( Rₜₐ − E[Rₜₐ] ) represents</text>

  <rect x="60" y="480" width="310" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="215" y="500" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">Abnormal return on day t</text>
  <text x="215" y="520" text-anchor="middle" font-size="10" fill="#444444">Observed minus expected return</text>

  <rect x="430" y="480" width="310" height="52" rx="5" fill="#FFFFFF" stroke="#111111" stroke-width="1"/>
  <text x="585" y="500" text-anchor="middle" font-size="11" font-weight="700" fill="#111111">CAR sign and magnitude</text>
  <text x="585" y="520" text-anchor="middle" font-size="10" fill="#444444">Positive = event boosted · Negative = event depressed</text>

  <!-- Footer -->
  <line x1="60" y1="546" x2="740" y2="546" stroke="#CCCCCC" stroke-width="0.6"/>
  <text x="400" y="556" text-anchor="middle" font-size="9" fill="#AAAAAA">DATSCI7030 — CAR Formula Reference — Version 1.2 (corrected 2026-07-06 — ARIMA reference removed, window matched to config.yaml)</text>
</svg>
